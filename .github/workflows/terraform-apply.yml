name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-apply.yml'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Ensure S3 state bucket exists
        run: |
          aws s3api head-bucket --bucket "${{ secrets.TF_STATE_BUCKET }}" \
            --region "${{ secrets.AWS_REGION }}" 2>/dev/null || \
          aws s3api create-bucket \
            --bucket "${{ secrets.TF_STATE_BUCKET }}" \
            --region "${{ secrets.AWS_REGION }}" \
            $([ "${{ secrets.AWS_REGION }}" != "us-east-1" ] && \
              echo "--create-bucket-configuration LocationConstraint=${{ secrets.AWS_REGION }}") && \
          aws s3api put-bucket-versioning \
            --bucket "${{ secrets.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled && \
          aws s3api put-bucket-encryption \
            --bucket "${{ secrets.TF_STATE_BUCKET }}" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Ensure DynamoDB lock table exists
        run: |
          aws dynamodb describe-table \
            --table-name "${{ secrets.TF_LOCK_TABLE }}" \
            --region "${{ secrets.AWS_REGION }}" 2>/dev/null || \
          aws dynamodb create-table \
            --table-name "${{ secrets.TF_LOCK_TABLE }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=urbanhood/prod/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="github_token=${{ secrets.GH_PAT_AMPLIFY }}" \
            -var="nextauth_secret=${{ secrets.NEXTAUTH_SECRET }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="sending_domain=${{ secrets.SENDING_DOMAIN }}" \
            -var="app_domain=${{ secrets.APP_DOMAIN }}" \
            -var="smtp_host=${{ secrets.SMTP_HOST }}" \
            -var="smtp_user=${{ secrets.SMTP_USER }}" \
            -var="smtp_password=${{ secrets.SMTP_PASSWORD }}" \
            -var="smtp_from=${{ secrets.SMTP_FROM }}"

      - name: Export Amplify App ID to output
        id: tf_outputs
        run: |
          echo "amplify_app_id=$(terraform output -raw amplify_app_id)" >> $GITHUB_OUTPUT
          echo "ssm_db_url=$(terraform output -raw ssm_database_url_name)" >> $GITHUB_OUTPUT

    outputs:
      amplify_app_id: ${{ steps.tf_outputs.outputs.amplify_app_id }}
      ssm_db_url: ${{ steps.tf_outputs.outputs.ssm_db_url }}

  # Automatically run migrations after infrastructure is provisioned
  migrate:
    name: Run DB Migrations
    needs: apply
    uses: ./.github/workflows/db-migrate.yml
    secrets: inherit
    with:
      ssm_db_url_param: ${{ needs.apply.outputs.ssm_db_url }}
