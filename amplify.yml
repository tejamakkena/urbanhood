version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -ex
              echo "=== Initial PWD: $PWD ==="
              echo "=== AMPLIFY_MONOREPO_APP_ROOT: $AMPLIFY_MONOREPO_APP_ROOT ==="
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do
                cd ..
              done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== Resolved repo root: $PWD ==="
              npm install -g pnpm@9
              NODE_ENV=development pnpm install --frozen-lockfile
              pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - |
              set -ex
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do
                cd ..
              done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== Building from repo root: $PWD ==="
              pnpm --filter @urbanhood/web build

              SD="apps/web/.next/standalone"
              [ -d "$SD" ] || { echo "ERROR: standalone dir missing at $SD"; exit 1; }

              # Flatten nested standalone (caused by outputFileTracingRoot=monorepo root)
              if [ -d "$SD/apps/web" ]; then
                echo "=== flattening nested standalone via tar ==="
                ( cd "$SD/apps/web" && tar cf - . ) | ( cd "$SD" && tar xf - )
                rm -rf "$SD/apps"
              fi

              # Copy static and public into standalone (Next.js standalone doesn't do this)
              cp -r apps/web/.next/static "$SD/.next/static"
              [ -d apps/web/public ] && cp -r apps/web/public "$SD/public" || true

              echo "=== required-server-files.json present? ==="
              ls -la apps/web/.next/required-server-files.json
              echo "=== standalone server.js present? ==="
              ls -la "$SD/server.js"
              echo "=== .next contents ==="
              ls -la apps/web/.next/
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
