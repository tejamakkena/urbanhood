version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - cd "$(git rev-parse --show-toplevel)" && NODE_ENV=development pnpm install --frozen-lockfile
            - cd "$(git rev-parse --show-toplevel)" && pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - |
              set -e
              ROOT="$(git rev-parse --show-toplevel)"
              echo "=== repo root: $ROOT ==="
              cd "$ROOT"
              pnpm --filter @urbanhood/web build
              echo "=== .next contents ==="
              ls -la apps/web/.next/
              SD="apps/web/.next/standalone"
              if [ -d "$SD/apps/web" ]; then
                echo "=== nested standalone structure detected ==="
                cp -r apps/web/.next/static "$SD/apps/web/.next/static"
                [ -d apps/web/public ] && cp -r apps/web/public "$SD/apps/web/public" || true
                cp -r "$SD/apps/web/." "$SD/"
                rm -rf "$SD/apps"
              else
                echo "=== flat standalone structure detected ==="
                cp -r apps/web/.next/static "$SD/.next/static"
                [ -d apps/web/public ] && cp -r apps/web/public "$SD/public" || true
              fi
              echo "=== final standalone ==="
              ls -la "$SD"
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
