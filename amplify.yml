version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -ex
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do cd ..; done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== repo root: $PWD ==="
              npm install -g pnpm@9
              NODE_ENV=development pnpm install --frozen-lockfile
              pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - |
              set -ex
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do cd ..; done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== building from: $PWD ==="

              # Step 1: Build Next.js (produces .next/standalone with nested apps/web/)
              pnpm --filter @urbanhood/web build

              SD="apps/web/.next/standalone"
              # Deploy dir MUST be outside .next/ — putting it inside causes pnpm to
              # create a node_modules/@urbanhood/web symlink back into the source
              # package, which Next.js's recursive-delete then follows and corrupts
              # the source on subsequent builds.
              DEPLOY="apps/web/.amplify-deploy"

              [ -d "$SD" ] || { echo "ERROR: standalone dir missing after build"; exit 1; }

              # Step 2: pnpm deploy creates a self-contained dir with all production deps.
              # Every symlink in .pnpm resolves within DEPLOY/ — no broken cross-dir symlinks.
              # Use absolute path: pnpm --filter resolves relative paths from the
              # filtered package's directory, not the workspace root.
              rm -rf "$DEPLOY"
              pnpm --filter @urbanhood/web deploy --prod "$PWD/$DEPLOY"

              # pnpm deploy creates node_modules/@urbanhood/web → workspace source
              # as a self-reference. Remove it: the deployed app IS the package, no
              # one needs to require '@urbanhood/web', and the symlink causes Amplify
              # artifact packaging to recurse into the source tree.
              rm -f "$DEPLOY/node_modules/@urbanhood/web"

              # Step 3: Copy generated Prisma engine into deploy node_modules.
              # pnpm deploy installs @prisma/client fresh but without the generated
              # .prisma/client/ engine binary. Copy it from the workspace where
              # db:generate already ran in preBuild.
              PRISMA_STORE="$(find node_modules/.pnpm -maxdepth 2 -type d \
                -name '@prisma+client@*' 2>/dev/null | head -1)"
              if [ -d "$PRISMA_STORE/node_modules/.prisma" ]; then
                DEPLOY_PRISMA_STORE="$(find "$DEPLOY/node_modules/.pnpm" -maxdepth 2 \
                  -type d -name '@prisma+client@*' 2>/dev/null | head -1)"
                if [ -n "$DEPLOY_PRISMA_STORE" ]; then
                  cp -r "$PRISMA_STORE/node_modules/.prisma" \
                    "$DEPLOY_PRISMA_STORE/node_modules/.prisma"
                  echo "OK: Copied Prisma engine to deploy"
                else
                  echo "ERROR: @prisma+client not found in deploy .pnpm store"
                  exit 1
                fi
              else
                echo "ERROR: Prisma engine not found in workspace — was db:generate run?"
                exit 1
              fi

              # Step 4: Graft server.js and .next/server from the standalone build.
              # Next.js in a pnpm workspace nests the output: standalone/apps/web/
              if [ -d "$SD/apps/web" ]; then
                SRC="$SD/apps/web"
              else
                SRC="$SD"
              fi
              cp "$SRC/server.js" "$DEPLOY/server.js"
              mkdir -p "$DEPLOY/.next"
              cp -r "$SRC/.next/server" "$DEPLOY/.next/server"

              # Step 5: Copy files required by Amplify WEB_COMPUTE validation
              cp "apps/web/.next/required-server-files.json" "$DEPLOY/required-server-files.json"
              cp "apps/web/.next/required-server-files.json" "$DEPLOY/.next/required-server-files.json"
              cp "apps/web/.next/BUILD_ID" "$DEPLOY/.next/BUILD_ID" 2>/dev/null || true
              cp apps/web/.next/*.json "$DEPLOY/.next/" 2>/dev/null || true
              cp -r "apps/web/.next/static" "$DEPLOY/.next/static"
              [ -d "apps/web/public" ] && cp -r "apps/web/public" "$DEPLOY/public" || true

              # Step 6: Strip build-time SWC compiler binaries (~276 MB, not needed at runtime)
              rm -rf "$DEPLOY/node_modules/.pnpm/@next+swc-"* 2>/dev/null || true
              rm -rf "$DEPLOY/node_modules/@next/swc-"* 2>/dev/null || true

              # Verify critical files exist before handing off to Amplify
              [ -f "$DEPLOY/required-server-files.json" ] \
                && echo "OK: required-server-files.json" \
                || { echo "FAIL: required-server-files.json missing"; exit 1; }
              [ -f "$DEPLOY/server.js" ] \
                && echo "OK: server.js" \
                || { echo "FAIL: server.js missing"; exit 1; }
              [ -d "$DEPLOY/.next/server" ] \
                && echo "OK: .next/server" \
                || { echo "FAIL: .next/server missing"; exit 1; }
              [ -d "$DEPLOY/node_modules/next" ] \
                && echo "OK: node_modules/next" \
                || echo "WARNING: node_modules/next not at flat path"
      artifacts:
        baseDirectory: .amplify-deploy
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
