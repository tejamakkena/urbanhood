name: Mobile Build (EAS)

on:
  # Manual trigger with platform selection
  workflow_dispatch:
    inputs:
      platform:
        description: "Build platform"
        required: true
        default: "all"
        type: choice
        options: [all, ios, android]
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options: [development, preview, production]

  # Auto-build production on version tags
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  build:
    name: EAS Build (${{ inputs.platform || 'all' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        working-directory: apps/mobile
        run: |
          PROFILE="${{ inputs.profile || 'production' }}"
          PLATFORM="${{ inputs.platform || 'all' }}"
          eas build --platform "$PLATFORM" --profile "$PROFILE" --non-interactive

      - name: EAS Submit (production only)
        if: ${{ (inputs.profile == 'production' || startsWith(github.ref, 'refs/tags/')) && inputs.platform != '' }}
        working-directory: apps/mobile
        run: eas submit --platform "${{ inputs.platform || 'all' }}" --latest --non-interactive
