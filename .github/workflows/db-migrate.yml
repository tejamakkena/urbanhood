name: DB Migrate

on:
  # Called by terraform-apply.yml after infra changes
  workflow_call:
    inputs:
      ssm_db_url_param:
        required: false
        type: string
        default: "/urbanhood/prod/database-url"

  # Also triggered on app code changes that include schema modifications
  push:
    branches: [main]
    paths:
      - 'packages/db/prisma/schema.prisma'
      - 'packages/db/prisma/migrations/**'
      - '.github/workflows/db-migrate.yml'

  # Allow manual trigger for emergency re-runs
  workflow_dispatch:
    inputs:
      ssm_db_url_param:
        description: "SSM parameter name for DATABASE_URL"
        required: false
        default: "/urbanhood/prod/database-url"

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    name: Prisma Migrate Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check SSM parameter exists
        id: ssm_check
        run: |
          SSM_PARAM="${{ inputs.ssm_db_url_param || '/urbanhood/prod/database-url' }}"
          echo "ssm_param=$SSM_PARAM" >> $GITHUB_OUTPUT

          if aws ssm get-parameter --name "$SSM_PARAM" --with-decryption \
              --query "Parameter.Value" --output text > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::SSM parameter '$SSM_PARAM' not found."
            echo "Infrastructure has not been provisioned yet."
            echo "Merge the Terraform workflow changes and run terraform apply first."
          fi

      - name: Fetch DATABASE_URL from SSM
        if: steps.ssm_check.outputs.exists == 'true'
        run: |
          DB_URL=$(aws ssm get-parameter \
            --name "${{ steps.ssm_check.outputs.ssm_param }}" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV

      - name: Setup pnpm
        if: steps.ssm_check.outputs.exists == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.ssm_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.ssm_check.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: steps.ssm_check.outputs.exists == 'true'
        run: pnpm --filter @urbanhood/db db:generate

      - name: Run migrations
        if: steps.ssm_check.outputs.exists == 'true'
        run: pnpm --filter @urbanhood/db db:migrate:prod

      - name: Trigger Amplify deployment
        if: steps.ssm_check.outputs.exists == 'true'
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          if [ -z "$AMPLIFY_APP_ID" ]; then
            echo "AMPLIFY_APP_ID not set yet — skipping deployment trigger."
            echo "Add it to GitHub Secrets after first terraform apply."
            exit 0
          fi
          aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-type RELEASE \
            --query "jobSummary.jobId" \
            --output text
