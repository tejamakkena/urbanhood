version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - cd ../.. && NODE_ENV=development pnpm install --frozen-lockfile
            - pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - cd ../.. && pnpm --filter @urbanhood/web build
            - cp -r apps/web/.next/static apps/web/.next/standalone/.next/static
            - '[ -d apps/web/public ] && cp -r apps/web/public apps/web/.next/standalone/public || true'
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
