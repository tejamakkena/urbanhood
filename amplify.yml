version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - cd ../.. && NODE_ENV=development pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - cd ../.. && pnpm --filter @urbanhood/web build
            - cp -r .next/static .next/standalone/.next/static
            - '[ -d public ] && cp -r public .next/standalone/public || true'
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
