version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -ex
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do cd ..; done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== repo root: $PWD ==="
              npm install -g pnpm@9
              NODE_ENV=development pnpm install --frozen-lockfile
              pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - |
              set -ex
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do cd ..; done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== building from: $PWD ==="
              pnpm --filter @urbanhood/web build

              SD="apps/web/.next/standalone"
              [ -d "$SD" ] || { echo "ERROR: standalone dir missing"; exit 1; }

              # Flatten nested structure produced by outputFileTracingRoot=monorepo root
              if [ -d "$SD/apps/web" ]; then
                echo "=== flattening nested standalone ==="
                ( cd "$SD/apps/web" && tar cf - . ) | ( cd "$SD" && tar xf - )
                rm -rf "$SD/apps"
              fi

              # Amplify checks for required-server-files.json at the artifact root.
              # With baseDirectory=.next/standalone, artifact root is standalone/.
              # The file lives in .next/ (not standalone/), so copy it in.
              cp apps/web/.next/required-server-files.json "$SD/"

              # Copy static assets and public dir into standalone
              cp -r apps/web/.next/static "$SD/.next/static"
              [ -d apps/web/public ] && cp -r apps/web/public "$SD/public" || true

              # Verify all three things Amplify checks for
              [ -f "$SD/required-server-files.json" ] \
                && echo "OK: required-server-files.json" \
                || { echo "FAIL: required-server-files.json missing"; exit 1; }
              [ -f "$SD/server.js" ] \
                && echo "OK: server.js" \
                || { echo "FAIL: server.js missing"; exit 1; }
              echo "=== node_modules/next location ==="
              find "$SD/node_modules" -maxdepth 4 -name "package.json" \
                -path "*/next/package.json" 2>/dev/null | head -5
              [ -d "$SD/node_modules/next" ] \
                && echo "OK: node_modules/next" \
                || echo "WARNING: node_modules/next not at flat path (may be in .pnpm)"
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
