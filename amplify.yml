version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - cd ../.. && NODE_ENV=development pnpm install --frozen-lockfile
            - pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - cd ../.. && pnpm --filter @urbanhood/web build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
