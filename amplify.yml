version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -ex
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do cd ..; done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== repo root: $PWD ==="
              npm install -g pnpm@9
              NODE_ENV=development pnpm install --frozen-lockfile
              pnpm --filter @urbanhood/db db:generate
        build:
          commands:
            - |
              set -ex
              while [ "$PWD" != "/" ] && [ ! -f pnpm-workspace.yaml ]; do cd ..; done
              [ -f pnpm-workspace.yaml ] || { echo "ERROR: pnpm-workspace.yaml not found"; exit 1; }
              echo "=== building from: $PWD ==="

              # Step 1: Build Next.js (produces .next/standalone with nested apps/web/)
              pnpm --filter @urbanhood/web build

              SD="apps/web/.next/standalone"
              DEPLOY="apps/web/.amplify-deploy"

              [ -d "$SD" ] || { echo "ERROR: standalone dir missing after build"; exit 1; }

              # Step 2: Use the standalone output as the artifact base.
              # The .nft.json trace files inside standalone use relative paths calibrated
              # to the monorepo depth (e.g. ../../../../../node_modules from
              # apps/web/.next/server/pages/). Preserving the apps/web/ nesting keeps
              # those paths resolving correctly at runtime.
              rm -rf "$DEPLOY"
              cp -a "$SD/." "$DEPLOY/"

              # Step 3: Add a root-level server.js shim so Amplify finds the entry point.
              # The real server.js lives at apps/web/server.js inside the artifact; it
              # calls process.chdir(__dirname) so all relative paths resolve from there.
              printf 'require("./apps/web/server.js")\n' > "$DEPLOY/server.js"

              # Step 4: Copy static assets and public dir (standalone omits them).
              cp -r "apps/web/.next/static" "$DEPLOY/apps/web/.next/static"
              [ -d "apps/web/public" ] && cp -r "apps/web/public" "$DEPLOY/apps/web/public" || true

              # Step 5: Copy the root-level .nft.json trace files that Amplify WEB_COMPUTE
              # validation requires. These live in .next/ (not .next/server/) and are not
              # included in the standalone output.
              cp "apps/web/.next/next-server.js.nft.json" \
                 "$DEPLOY/apps/web/.next/next-server.js.nft.json"
              cp "apps/web/.next/next-minimal-server.js.nft.json" \
                 "$DEPLOY/apps/web/.next/next-minimal-server.js.nft.json"

              # Step 6: Copy required-server-files.json to the artifact root for Amplify
              # validation (it also exists at apps/web/.next/ inside the standalone).
              cp "apps/web/.next/required-server-files.json" "$DEPLOY/required-server-files.json"

              # Step 7: Copy the generated Prisma engine binary into the standalone's
              # pnpm store. The standalone includes @prisma/client but not the generated
              # .prisma/client/ engine; db:generate ran in preBuild so copy from there.
              PRISMA_STORE="$(find node_modules/.pnpm -maxdepth 2 -type d \
                -name '@prisma+client@*' 2>/dev/null | head -1)"
              if [ -d "$PRISMA_STORE/node_modules/.prisma" ]; then
                DEPLOY_PRISMA_STORE="$(find "$DEPLOY/node_modules/.pnpm" -maxdepth 2 \
                  -type d -name '@prisma+client@*' 2>/dev/null | head -1)"
                if [ -n "$DEPLOY_PRISMA_STORE" ]; then
                  cp -r "$PRISMA_STORE/node_modules/.prisma" \
                    "$DEPLOY_PRISMA_STORE/node_modules/.prisma"
                  echo "OK: Copied Prisma engine to standalone deploy"
                else
                  echo "ERROR: @prisma+client not found in standalone deploy .pnpm store"
                  exit 1
                fi
              else
                echo "ERROR: Prisma engine not found in workspace — was db:generate run?"
                exit 1
              fi

              # Step 8: Strip build-time SWC compiler binaries (~276 MB, not needed at runtime)
              rm -rf "$DEPLOY/node_modules/.pnpm/@next+swc-"* 2>/dev/null || true
              rm -rf "$DEPLOY/apps/web/node_modules/.pnpm/@next+swc-"* 2>/dev/null || true

              # Verify the artifact before handing off to Amplify
              [ -f "$DEPLOY/server.js" ] \
                && echo "OK: server.js (shim)" \
                || { echo "FAIL: server.js missing"; exit 1; }
              [ -f "$DEPLOY/apps/web/server.js" ] \
                && echo "OK: apps/web/server.js (real)" \
                || { echo "FAIL: apps/web/server.js missing"; exit 1; }
              [ -f "$DEPLOY/required-server-files.json" ] \
                && echo "OK: required-server-files.json" \
                || { echo "FAIL: required-server-files.json missing"; exit 1; }
              [ -f "$DEPLOY/apps/web/.next/next-server.js.nft.json" ] \
                && echo "OK: next-server.js.nft.json" \
                || { echo "FAIL: next-server.js.nft.json missing"; exit 1; }
              [ -d "$DEPLOY/apps/web/.next/server" ] \
                && echo "OK: apps/web/.next/server" \
                || { echo "FAIL: apps/web/.next/server missing"; exit 1; }
              [ -d "$DEPLOY/apps/web/.next/static" ] \
                && echo "OK: apps/web/.next/static" \
                || { echo "FAIL: apps/web/.next/static missing"; exit 1; }
              NTF=$(find "$DEPLOY/apps/web/.next/server" -name "*.nft.json" | wc -l)
              echo "INFO: $NTF .nft.json trace files in apps/web/.next/server"
              [ "$NTF" -gt 0 ] || { echo "FAIL: no .nft.json trace files"; exit 1; }
      artifacts:
        baseDirectory: .amplify-deploy
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
